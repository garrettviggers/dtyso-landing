<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" width="720" height="400">
  <defs>
    <!-- soft drop shadow for whole garment -->
    <filter id="drop" x="-20%" y="-15%" width="140%" height="135%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#9b8e7d" flood-opacity="0.28"/>
    </filter>
    <!-- gentle blur for fold shadows -->
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
    <filter id="softer" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>

    <!-- main fabric body: soft volumetric sand -->
    <radialGradient id="sand-body" cx="50%" cy="30%" r="75%">
      <stop offset="0%"  stop-color="#EFE7DA"/>
      <stop offset="48%" stop-color="#E6DBCF"/>
      <stop offset="82%" stop-color="#D8CCBC"/>
      <stop offset="100%" stop-color="#CABDAB"/>
    </radialGradient>
    <linearGradient id="sleeve-grad-l" x1="100%" y1="10%" x2="0%" y2="90%">
      <stop offset="0%"  stop-color="#E2D7C9"/>
      <stop offset="60%" stop-color="#D4C8B6"/>
      <stop offset="100%" stop-color="#C2B5A1"/>
    </linearGradient>
    <linearGradient id="sleeve-grad-r" x1="0%" y1="10%" x2="100%" y2="90%">
      <stop offset="0%"  stop-color="#E2D7C9"/>
      <stop offset="60%" stop-color="#D4C8B6"/>
      <stop offset="100%" stop-color="#C2B5A1"/>
    </linearGradient>
    <radialGradient id="hood-tunnel" cx="50%" cy="40%" r="65%">
      <stop offset="0%"  stop-color="#B3A693"/>
      <stop offset="70%" stop-color="#9A8D7A"/>
      <stop offset="100%" stop-color="#857A68"/>
    </radialGradient>
    <linearGradient id="rib" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#D4C8B8"/>
      <stop offset="100%" stop-color="#BEB19E"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="720" height="400" fill="#F7F3ED"/>
  <!-- large faint orange brand motif on left edge, echoing zoe guide -->
  <text x="-18" y="320" font-family="'Arial Black', sans-serif" font-size="300" font-weight="900"
        fill="#E8581A" opacity="0.10" letter-spacing="-20">#</text>

  <!-- ============================ FRONT VIEW ============================ -->
  <g transform="translate(30,26)" filter="url(#drop)">

    <!-- LEFT sleeve -->
    <path d="M96 96
             C70 100, 50 116, 40 140
             L22 214
             C20 226, 28 232, 40 230
             C50 228, 54 222, 56 214
             L72 152
             C80 130, 90 116, 104 110 Z"
          fill="url(#sleeve-grad-l)"/>
    <!-- RIGHT sleeve -->
    <path d="M254 96
             C280 100, 300 116, 310 140
             L328 214
             C330 226, 322 232, 310 230
             C300 228, 296 222, 294 214
             L278 152
             C270 130, 260 116, 246 110 Z"
          fill="url(#sleeve-grad-r)"/>

    <!-- BODY -->
    <path d="M104 104
             C86 116, 78 138, 78 162
             L74 332
             C74 346, 82 352, 94 352
             L256 352
             C268 352, 276 346, 276 332
             L272 162
             C272 138, 264 116, 246 104
             C224 96, 200 92, 175 92
             C150 92, 126 96, 104 104 Z"
          fill="url(#sand-body)"/>

    <!-- soft fold shadows on body -->
    <path d="M120 150 C118 230, 122 300, 118 340" stroke="#BBae9b" stroke-width="9" fill="none" opacity="0.20" filter="url(#softer)"/>
    <path d="M230 150 C232 230, 228 300, 232 340" stroke="#BBae9b" stroke-width="9" fill="none" opacity="0.20" filter="url(#softer)"/>
    <path d="M175 120 C175 200, 175 290, 175 340" stroke="#fff" stroke-width="22" fill="none" opacity="0.16" filter="url(#softer)"/>
    <!-- armpit shadows -->
    <path d="M104 110 C112 130,116 150,114 168" stroke="#a99c89" stroke-width="7" fill="none" opacity="0.3" filter="url(#soft)"/>
    <path d="M246 110 C238 130,234 150,236 168" stroke="#a99c89" stroke-width="7" fill="none" opacity="0.3" filter="url(#soft)"/>

    <!-- HOOD (standing up) -->
    <path d="M110 100
             C104 70, 110 42, 130 24
             C145 11, 160 8, 175 8
             C190 8, 205 11, 220 24
             C240 42, 246 70, 240 100
             C216 90, 196 86, 175 86
             C154 86, 134 90, 110 100 Z"
          fill="url(#sand-body)"/>
    <!-- hood outer fold shadow -->
    <path d="M118 96 C112 66,120 40,136 26" stroke="#fff" stroke-width="8" fill="none" opacity="0.22" filter="url(#soft)"/>
    <path d="M232 96 C238 66,230 40,214 26" stroke="#a99c89" stroke-width="8" fill="none" opacity="0.28" filter="url(#soft)"/>
    <!-- hood inner tunnel (the opening) -->
    <path d="M132 94
             C130 80, 142 70, 156 66
             C164 64, 186 64, 194 66
             C208 70, 220 80, 218 94
             C198 102, 188 104, 175 104
             C162 104, 152 102, 132 94 Z"
          fill="url(#hood-tunnel)"/>
    <!-- inner tunnel rim highlight -->
    <path d="M134 92 C160 100, 190 100, 216 92" stroke="#C9BCA9" stroke-width="2.5" fill="none" opacity="0.55"/>
    <ellipse cx="175" cy="88" rx="42" ry="9" fill="#6f6657" opacity="0.35" filter="url(#soft)"/>

    <!-- drawstrings -->
    <path d="M160 102 C158 130, 154 160, 152 184" stroke="#D6CABA" stroke-width="2.4" fill="none"/>
    <path d="M190 102 C192 130, 196 160, 198 184" stroke="#D6CABA" stroke-width="2.4" fill="none"/>
    <path d="M160 102 C158 130, 154 160, 152 184" stroke="#a99c89" stroke-width="0.8" fill="none" opacity="0.5"/>
    <path d="M190 102 C192 130, 196 160, 198 184" stroke="#a99c89" stroke-width="0.8" fill="none" opacity="0.5"/>
    <rect x="149" y="182" width="6" height="13" rx="3" fill="#C3B6A4"/>
    <rect x="195" y="182" width="6" height="13" rx="3" fill="#C3B6A4"/>

    <!-- kangaroo pocket -->
    <path d="M112 256
             C110 254, 106 256, 106 260
             L104 312
             C104 320, 110 324, 118 324
             L232 324
             C240 324, 246 320, 246 312
             L244 260
             C244 256, 240 254, 238 256
             C238 270, 230 276, 218 276
             L132 276
             C120 276, 112 270, 112 256 Z"
          fill="#000" opacity="0.05"/>
    <path d="M112 258 C112 272, 122 278, 134 278 L216 278 C228 278, 238 272, 238 258"
          stroke="#a99c89" stroke-width="2" fill="none" opacity="0.45"/>
    <!-- pocket opening shadows -->
    <path d="M112 258 C120 262,124 268,124 276" stroke="#857a68" stroke-width="4" fill="none" opacity="0.3" filter="url(#soft)"/>
    <path d="M238 258 C230 262,226 268,226 276" stroke="#857a68" stroke-width="4" fill="none" opacity="0.3" filter="url(#soft)"/>

    <!-- ribbed hem -->
    <path d="M74 332 C74 346, 82 354, 94 356 L256 356 C268 354, 276 346, 276 332
             L276 348 C276 362, 268 370, 256 372 L94 372 C82 370, 74 362, 74 348 Z"
          fill="url(#rib)"/>
    <g stroke="#a99c89" stroke-width="0.8" opacity="0.45">
      <line x1="80" y1="346" x2="270" y2="346"/>
      <line x1="80" y1="352" x2="270" y2="352"/>
      <line x1="80" y1="358" x2="270" y2="358"/>
      <line x1="80" y1="364" x2="270" y2="364"/>
    </g>

    <!-- ribbed cuffs -->
    <path d="M22 210 C20 224, 26 232, 38 232 L52 230 C58 226, 56 212, 54 206 Z" fill="url(#rib)"/>
    <g stroke="#a99c89" stroke-width="0.7" opacity="0.4">
      <line x1="24" y1="214" x2="54" y2="212"/>
      <line x1="25" y1="220" x2="54" y2="218"/>
      <line x1="26" y1="226" x2="52" y2="225"/>
    </g>
    <path d="M328 210 C330 224, 324 232, 312 232 L298 230 C292 226, 294 212, 296 206 Z" fill="url(#rib)"/>
    <g stroke="#a99c89" stroke-width="0.7" opacity="0.4">
      <line x1="296" y1="212" x2="326" y2="214"/>
      <line x1="296" y1="218" x2="325" y2="220"/>
      <line x1="298" y1="225" x2="324" y2="226"/>
    </g>

    <!-- CENTERED #DTYSO on chest -->
    <text x="175" y="200" font-family="'Arial Black','Helvetica Neue',sans-serif"
          font-size="30" font-weight="900" fill="#E8581A"
          text-anchor="middle" letter-spacing="1.5">#DTYSO</text>
  </g>
  <text x="205" y="392" font-family="Arial,sans-serif" font-size="9" fill="#A99B88"
        text-anchor="middle" letter-spacing="2.5" font-weight="700">FRONT</text>

  <!-- ============================ BACK VIEW ============================ -->
  <g transform="translate(390,26)" filter="url(#drop)">

    <!-- LEFT sleeve -->
    <path d="M96 96
             C70 100, 50 116, 40 140
             L22 214
             C20 226, 28 232, 40 230
             C50 228, 54 222, 56 214
             L72 152
             C80 130, 90 116, 104 110 Z"
          fill="url(#sleeve-grad-l)"/>
    <!-- RIGHT sleeve -->
    <path d="M254 96
             C280 100, 300 116, 310 140
             L328 214
             C330 226, 322 232, 310 230
             C300 228, 296 222, 294 214
             L278 152
             C270 130, 260 116, 246 110 Z"
          fill="url(#sleeve-grad-r)"/>

    <!-- BODY -->
    <path d="M104 104
             C86 116, 78 138, 78 162
             L74 332
             C74 346, 82 352, 94 352
             L256 352
             C268 352, 276 346, 276 332
             L272 162
             C272 138, 264 116, 246 104
             C224 96, 200 92, 175 92
             C150 92, 126 96, 104 104 Z"
          fill="url(#sand-body)"/>

    <!-- fold shadows -->
    <path d="M120 150 C118 230, 122 300, 118 340" stroke="#BBae9b" stroke-width="9" fill="none" opacity="0.18" filter="url(#softer)"/>
    <path d="M230 150 C232 230, 228 300, 232 340" stroke="#BBae9b" stroke-width="9" fill="none" opacity="0.18" filter="url(#softer)"/>
    <path d="M175 120 C175 200, 175 290, 175 340" stroke="#fff" stroke-width="22" fill="none" opacity="0.14" filter="url(#softer)"/>
    <path d="M104 110 C112 130,116 150,114 168" stroke="#a99c89" stroke-width="7" fill="none" opacity="0.3" filter="url(#soft)"/>
    <path d="M246 110 C238 130,234 150,236 168" stroke="#a99c89" stroke-width="7" fill="none" opacity="0.3" filter="url(#soft)"/>

    <!-- HOOD draped down the back (rounded flat shape) -->
    <path d="M118 96
             C112 100, 110 108, 112 120
             C118 150, 140 172, 175 176
             C210 172, 232 150, 238 120
             C240 108, 238 100, 232 96
             C210 90, 192 88, 175 88
             C158 88, 140 90, 118 96 Z"
          fill="url(#sand-body)"/>
    <!-- hood seam + shading -->
    <path d="M120 100 C128 140, 150 166, 175 170 C200 166, 222 140, 230 100"
          stroke="#a99c89" stroke-width="1.6" fill="none" opacity="0.4"/>
    <path d="M132 104 C140 138, 156 160, 175 164" stroke="#fff" stroke-width="6" fill="none" opacity="0.18" filter="url(#soft)"/>
    <path d="M218 104 C210 138, 194 160, 175 164" stroke="#857a68" stroke-width="6" fill="none" opacity="0.22" filter="url(#soft)"/>
    <!-- neck seam -->
    <path d="M118 96 C145 88, 205 88, 232 96" stroke="#a99c89" stroke-width="1.4" fill="none" opacity="0.35"/>

    <!-- ribbed hem -->
    <path d="M74 332 C74 346, 82 354, 94 356 L256 356 C268 354, 276 346, 276 332
             L276 348 C276 362, 268 370, 256 372 L94 372 C82 370, 74 362, 74 348 Z"
          fill="url(#rib)"/>
    <g stroke="#a99c89" stroke-width="0.8" opacity="0.45">
      <line x1="80" y1="346" x2="270" y2="346"/>
      <line x1="80" y1="352" x2="270" y2="352"/>
      <line x1="80" y1="358" x2="270" y2="358"/>
      <line x1="80" y1="364" x2="270" y2="364"/>
    </g>
    <!-- cuffs -->
    <path d="M22 210 C20 224, 26 232, 38 232 L52 230 C58 226, 56 212, 54 206 Z" fill="url(#rib)"/>
    <path d="M328 210 C330 224, 324 232, 312 232 L298 230 C292 226, 294 212, 296 206 Z" fill="url(#rib)"/>

    <!-- LARGE centered #DTYSO on back -->
    <text x="175" y="262" font-family="'Arial Black','Helvetica Neue',sans-serif"
          font-size="46" font-weight="900" fill="#E8581A"
          text-anchor="middle" letter-spacing="1">#DTYSO</text>
  </g>
  <text x="565" y="392" font-family="Arial,sans-serif" font-size="9" fill="#A99B88"
        text-anchor="middle" letter-spacing="2.5" font-weight="700">BACK</text>
</svg>
